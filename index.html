<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f3f5f9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0c1019" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="Build balanced Random Karma car selections for a target race time." />
  <title>Random Karma · Selection Calculator</title>
  <link data-trunk rel="css" href="style/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"
    integrity="sha384-b0GXujLkk9eYYSmcSfoyZbfyElGAQnDyY0skCHSG6w3JgTMFnz11ggrTAr7seu9f"
    crossorigin="anonymous"></script>
</head>

<body>
  <div id="root"></div>
  <link data-trunk rel="rust" href="Cargo.toml" data-bin="random_karma" data-type="main"
    data-wasm-opt="z"
    data-wasm-opt-params="--enable-bulk-memory-opt --enable-nontrapping-float-to-int" />
  <link data-trunk rel="rust" href="Cargo.toml" data-bin="worker" data-type="worker"
    data-wasm-opt="z"
    data-wasm-opt-params="--enable-bulk-memory-opt --enable-nontrapping-float-to-int" />
</body>

</html>
